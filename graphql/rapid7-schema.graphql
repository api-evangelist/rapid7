# ─────────────────────────────────────────────
# ROOT TYPES
# ─────────────────────────────────────────────

type Query {
  """Fetch a single asset by ID."""
  asset(id: ID!): Asset

  """List assets with optional filtering and pagination."""
  assets(filter: AssetFilter, page: Int, size: Int): AssetPage

  """Fetch an asset group by ID."""
  assetGroup(id: ID!): AssetGroup

  """List asset groups."""
  assetGroups(page: Int, size: Int): [AssetGroup!]

  """Fetch a vulnerability by its ID."""
  vulnerability(id: ID!): Vulnerability

  """List vulnerabilities with optional filtering."""
  vulnerabilities(filter: VulnFilter, page: Int, size: Int): VulnerabilityPage

  """Fetch scan details by ID."""
  scan(id: ID!): ScanDetails

  """List scans, optionally filtered by site or status."""
  scans(siteId: ID, status: ScanStatus, page: Int, size: Int): ScanPage

  """Fetch site details by ID."""
  site(id: ID!): SiteDetails

  """List all sites."""
  sites(page: Int, size: Int): SitePage

  """Fetch a report by ID."""
  report(id: ID!): Report

  """List generated reports."""
  reports(page: Int, size: Int): [Report!]

  """Fetch an InsightIDR investigation by ID."""
  investigation(id: ID!): Investigation

  """List InsightIDR investigations."""
  investigations(status: InvestigationStatus, page: Int, size: Int): InvestigationPage

  """Fetch an alert by ID."""
  alert(id: ID!): Alert

  """List alerts."""
  alerts(ruleId: ID, page: Int, size: Int): AlertPage

  """Fetch a policy by ID."""
  policy(id: ID!): Policy

  """List compliance policies."""
  policies(page: Int, size: Int): [Policy!]

  """Fetch an exploit by ID."""
  exploit(id: ID!): ExploitDetails

  """List known exploits."""
  exploits(page: Int, size: Int): [Exploit!]

  """Fetch a credential by ID."""
  credential(id: ID!): CredentialDetails

  """List credentials."""
  credentials(page: Int, size: Int): [Credential!]

  """Fetch a ticket by ID."""
  ticket(id: ID!): Ticket

  """List tickets."""
  tickets(status: TicketStatus, page: Int, size: Int): [Ticket!]

  """Fetch a SOAR workflow by ID."""
  soarWorkflow(id: ID!): SOARWorkflow

  """List SOAR workflows."""
  soarWorkflows(page: Int, size: Int): [SOARWorkflow!]

  """List API keys for the current organization."""
  apiKeys: [APIKey!]

  """List registered webhooks."""
  webhooks(page: Int, size: Int): [Webhook!]

  """Fetch a scan engine by ID."""
  scanEngine(id: ID!): ScanEngine

  """List scan engines."""
  scanEngines(page: Int, size: Int): [ScanEngine!]

  """List vulnerability exceptions."""
  exceptions(scope: ExceptionScope, page: Int, size: Int): [Exception!]

  """Fetch an exception by ID."""
  exception(id: ID!): ExceptionDetails

  """List asset discovery connections."""
  discoveries(page: Int, size: Int): [Discovery!]

  """Fetch a single discovery connection."""
  discovery(id: ID!): Discovery

  """List shared credentials."""
  sharedCredentials(page: Int, size: Int): [SharedCredential!]

  """Fetch a Metasploit module by ID."""
  metasploitModule(id: ID!): MetasploitModule

  """List remediation projects."""
  remediations(page: Int, size: Int): [Remediation!]

  """Fetch a remediation project by ID."""
  remediation(id: ID!): Remediation
}

type Mutation {
  """Launch a new vulnerability scan."""
  createScan(input: CreateScanInput!): Scan

  """Stop an active scan."""
  stopScan(id: ID!): Scan

  """Create a new site."""
  createSite(input: CreateSiteInput!): SiteDetails

  """Update an existing site."""
  updateSite(id: ID!, input: UpdateSiteInput!): SiteDetails

  """Delete a site."""
  deleteSite(id: ID!): Boolean

  """Create an asset group."""
  createAssetGroup(input: CreateAssetGroupInput!): AssetGroup

  """Update an asset group."""
  updateAssetGroup(id: ID!, input: UpdateAssetGroupInput!): AssetGroup

  """Delete an asset group."""
  deleteAssetGroup(id: ID!): Boolean

  """Apply a tag to an asset."""
  tagAsset(assetId: ID!, tag: AssetTagInput!): Asset

  """Remove a tag from an asset."""
  untagAsset(assetId: ID!, tagKey: String!): Asset

  """Create a vulnerability exception."""
  createException(input: CreateExceptionInput!): Exception

  """Update a vulnerability exception."""
  updateException(id: ID!, input: UpdateExceptionInput!): Exception

  """Delete a vulnerability exception."""
  deleteException(id: ID!): Boolean

  """Generate a new report."""
  createReport(input: CreateReportInput!): Report

  """Delete a report."""
  deleteReport(id: ID!): Boolean

  """Create a scan credential."""
  createCredential(input: CreateCredentialInput!): Credential

  """Update a scan credential."""
  updateCredential(id: ID!, input: UpdateCredentialInput!): Credential

  """Delete a scan credential."""
  deleteCredential(id: ID!): Boolean

  """Update an InsightIDR investigation."""
  updateInvestigation(id: ID!, input: UpdateInvestigationInput!): Investigation

  """Create an InsightIDR alert rule."""
  createAlertRule(input: CreateAlertRuleInput!): AlertRule

  """Update an InsightIDR alert rule."""
  updateAlertRule(id: ID!, input: UpdateAlertRuleInput!): AlertRule

  """Delete an InsightIDR alert rule."""
  deleteAlertRule(id: ID!): Boolean

  """Register a webhook endpoint."""
  createWebhook(input: CreateWebhookInput!): Webhook

  """Update a webhook registration."""
  updateWebhook(id: ID!, input: UpdateWebhookInput!): Webhook

  """Delete a webhook."""
  deleteWebhook(id: ID!): Boolean

  """Trigger a SOAR workflow manually."""
  triggerSOARWorkflow(id: ID!, input: SOARTriggerInput!): SOARWorkflow

  """Create a new Insight Platform API key."""
  createAPIKey(input: CreateAPIKeyInput!): APIKey

  """Delete an API key."""
  deleteAPIKey(id: ID!): Boolean
}
