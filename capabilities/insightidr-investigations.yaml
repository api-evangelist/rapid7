      description: Set the status of an investigation
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: insightidr-investigations.setstatus
      with:
        id: tools.id
        status: tools.status
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: rapid7-assignusertoinvestigation
      description: Assign user to investigation
      hints:
