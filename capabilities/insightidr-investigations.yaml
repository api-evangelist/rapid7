        idempotent: false
      call: insightidr-investigations.bulkcloseinvestigations
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: rapid7-listinvestigations
      description: List investigations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: insightidr-investigations.listinvestigations
      with:
        index: tools.index
