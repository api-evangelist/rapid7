naftiko: 1.0.0-alpha2
info:
  label: InsightVM API — Remediation
  description: 'InsightVM API — Remediation. 1 operations. Lead operation: Asset Vulnerability Solution. Self-contained Naftiko capability covering one business surface.'
  tags:
  - Rapid7
  - Remediation
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    RAPID7_API_KEY: RAPID7_API_KEY
capability:
  consumes:
  - type: http
    namespace: insightvm-console-swagger-remediation
    baseUri: https://localhost:3780
    description: InsightVM API — Remediation business capability. Self-contained, no shared references.
    resources:
    - name: api-3-assets-id-vulnerabilities-vulnerabilityid-solution
      path: /api/3/assets/{id}/vulnerabilities/{vulnerabilityId}/solution
      operations:
      - name: getassetvulnerabilitysolutions
        method: GET
        description: Asset Vulnerability Solution
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: The identifier of the asset.
          required: true
        - name: vulnerabilityId
          in: path
          type: string
          description: The identifier of the vulnerability.
          required: true
  exposes:
  - type: rest
    namespace: insightvm-console-swagger-remediation-rest
    port: 8080
    description: REST adapter for InsightVM API — Remediation. One resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/api/3/assets/{id}/vulnerabilities/{vulnerabilityId}/solution
      name: api-3-assets-id-vulnerabilities-vulnerabilityid-solution
      description: REST surface for api-3-assets-id-vulnerabilities-vulnerabilityid-solution.
      operations:
      - method: GET
        name: getassetvulnerabilitysolutions
        description: Asset Vulnerability Solution
        call: insightvm-console-swagger-remediation.getassetvulnerabilitysolutions
        with:
          id: rest.id
          vulnerabilityId: rest.vulnerabilityId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: insightvm-console-swagger-remediation-mcp
    port: 9090
    transport: http
    description: MCP adapter for InsightVM API — Remediation. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: rapid7-getassetvulnerabilitysolutions
      description: Asset Vulnerability Solution
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: insightvm-console-swagger-remediation.getassetvulnerabilitysolutions
      with:
        id: tools.id
        vulnerabilityId: tools.vulnerabilityId
      outputParameters:
      - type: object
        mapping: $.
