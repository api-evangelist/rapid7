      with: {}
      outputParameters:
      - type: object
        mapping: $.
    - name: rapid7-getlicense
      description: License
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: insightvm-console-swagger-administration.getlicense
      with: {}
      outputParameters:
      - type: object
        mapping: $.
    - name: rapid7-activatelicense
      description: License
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: insightvm-console-swagger-administration.activatelicense
      with:
        license: tools.license
        key: tools.key
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: rapid7-getproperties
      description: Properties
      hints:
        readOnly: true
