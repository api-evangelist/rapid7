naftiko: 1.0.0-alpha2
info:
  label: InsightIDR API — Local Accounts
  description: 'InsightIDR API — Local Accounts. 2 operations. Lead operation: Get local account by RRN. Self-contained Naftiko capability covering one business surface.'
  tags:
  - Rapid7
  - Local Accounts
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    RAPID7_API_KEY: RAPID7_API_KEY
capability:
  consumes:
  - type: http
    namespace: insightidr-local-accounts
    baseUri: https://{region}.api.insight.rapid7.com
    description: InsightIDR API — Local Accounts business capability. Self-contained, no shared references.
    resources:
    - name: idr-v1-assets-local-accounts-search
      path: /idr/v1/assets/local-accounts/_search
      operations:
      - name: searchlocalaccounts
        method: POST
        description: Search local accounts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: index
          in: query
          type: integer
          description: The optional, 0 based index of the page to retrieve.  Must be an integer greater than or equal to 0.
        - name: size
          in: query
          type: integer
          description: The optional size of the page to retrieve. Must be an integer greater than 0 or less than or equal to 1000.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: idr-v1-assets-local-accounts-rrn
      path: /idr/v1/assets/local-accounts/{rrn}
      operations:
      - name: getlocalaccountbyrrn
        method: GET
        description: Get local account by RRN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: rrn
          in: path
          type: string
          description: The RRN of the local account.
          required: true
  exposes:
  - type: rest
    namespace: insightidr-local-accounts-rest
    port: 8080
    description: REST adapter for InsightIDR API — Local Accounts. One resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/idr/v1/assets/local-accounts/_search
      name: idr-v1-assets-local-accounts-search
      description: REST surface for idr-v1-assets-local-accounts-search.
      operations:
      - method: POST
        name: searchlocalaccounts
        description: Search local accounts
        call: insightidr-local-accounts.searchlocalaccounts
        with:
          index: rest.index
          size: rest.size
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/idr/v1/assets/local-accounts/{rrn}
      name: idr-v1-assets-local-accounts-rrn
      description: REST surface for idr-v1-assets-local-accounts-rrn.
      operations:
      - method: GET
        name: getlocalaccountbyrrn
        description: Get local account by RRN
        call: insightidr-local-accounts.getlocalaccountbyrrn
        with:
          rrn: rest.rrn
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: insightidr-local-accounts-mcp
    port: 9090
    transport: http
    description: MCP adapter for InsightIDR API — Local Accounts. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: rapid7-searchlocalaccounts
      description: Search local accounts
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: insightidr-local-accounts.searchlocalaccounts
      with:
        index: tools.index
        size: tools.size
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: rapid7-getlocalaccountbyrrn
      description: Get local account by RRN
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: insightidr-local-accounts.getlocalaccountbyrrn
      with:
        rrn: tools.rrn
      outputParameters:
      - type: object
        mapping: $.
