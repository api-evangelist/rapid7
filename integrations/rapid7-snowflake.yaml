naftiko: 1.0.0-alpha2
info:
  label: Land Rapid7 InsightVM assets and vulnerabilities in Snowflake
  description: Stream InsightVM assets, vulnerabilities, and remediation status into Snowflake so vuln management metrics, MTTR dashboards, and exec reporting join cleanly with the rest of the company's analytics models.
  tags:
  - Rapid7
  - Integration
  - Data warehouse
  - snowflake
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    RAPID7_API_KEY: RAPID7_API_KEY
    SNOWFLAKE_API_KEY: SNOWFLAKE_API_KEY
capability:
  consumes:
  - type: http
    namespace: rapid7
    baseUri: https://us.api.insight.rapid7.com
    description: Rapid7 API operations consumed by this integration.
    resources:
    - name: api-3-assets
      path: /api/3/assets
      operations:
      - name: listassets
        method: GET
        description: List InsightVM assets.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: api-3-vulnerabilities
      path: /api/3/vulnerabilities
      operations:
      - name: listvulnerabilities
        method: GET
        description: List the vulnerability catalog.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: api-3-remediation-projects
      path: /api/3/remediation_projects
      operations:
      - name: listremediationprojects
        method: GET
        description: List remediation projects.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
  - type: http
    namespace: snowflake
    baseUri: https://yourorg.snowflakecomputing.com
    description: Snowflake SQL API operations consumed by this integration.
    resources:
    - name: api-v2-statements
      path: /api/v2/statements
      operations:
      - name: submitstatement
        method: POST
        description: 'Snowflake SQL API: submitStatement'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: rapid7-snowflake-mcp
    description: MCP adapter for the rapid7-snowflake integration.
    tools:
    - name: rapid7_snowflake
      description: Execute the rapid7 snowflake integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: rapid7-snowflake-rest
    port: 8080
    description: REST adapter for the rapid7-snowflake integration.
    resources:
    - path: /rapid7-snowflake
      name: rapid7-snowflake
      description: REST surface for the rapid7-snowflake integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the rapid7-snowflake integration.
        call: rapid7_snowflake
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
