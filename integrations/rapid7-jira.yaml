naftiko: 1.0.0-alpha2
info:
  label: Create Jira tickets for InsightVM remediation projects
  description: For each InsightVM remediation project task, create a corresponding Jira issue in the right project and component so platform and dev teams work vuln remediation through their existing ticketing flow.
  tags:
  - Rapid7
  - Integration
  - ITSM
  - jira
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    RAPID7_API_KEY: RAPID7_API_KEY
    JIRA_API_KEY: JIRA_API_KEY
capability:
  consumes:
  - type: http
    namespace: rapid7
    baseUri: https://us.api.insight.rapid7.com
    description: Rapid7 API operations consumed by this integration.
    resources:
    - name: api-3-remediation-projects
      path: /api/3/remediation_projects
      operations:
      - name: listremediationprojects
        method: GET
        description: List InsightVM remediation projects.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: api-3-remediation-projects-id
      path: /api/3/remediation_projects/{id}
      operations:
      - name: getremediationproject
        method: GET
        description: Get a remediation project and its scope.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Path parameter id.
          required: true
  - type: http
    namespace: jira
    baseUri: https://yourorg.atlassian.net
    description: Jira Cloud REST API operations consumed by this integration.
    resources:
    - name: rest-api-3-issue
      path: /rest/api/3/issue
      operations:
      - name: createissue
        method: POST
        description: 'Jira Cloud REST API: createIssue'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: rest-api-3-issue-issueidorkey
      path: /rest/api/3/issue/{issueIdOrKey}
      operations:
      - name: updateissue
        method: PUT
        description: 'Jira Cloud REST API: updateIssue'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: issueIdOrKey
          in: path
          type: string
          description: Path parameter issueIdOrKey.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: rapid7-jira-mcp
    description: MCP adapter for the rapid7-jira integration.
    tools:
    - name: rapid7_jira
      description: Execute the rapid7 jira integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: rapid7-jira-rest
    port: 8080
    description: REST adapter for the rapid7-jira integration.
    resources:
    - path: /rapid7-jira
      name: rapid7-jira
      description: REST surface for the rapid7-jira integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the rapid7-jira integration.
        call: rapid7_jira
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
