naftiko: 1.0.0-alpha2
info:
  label: Open ServiceNow incidents for InsightIDR investigations
  description: When an InsightIDR investigation is created with high priority, auto-open a ServiceNow incident with the investigation summary, assignee, and a link back to InsightIDR so SOC handoffs to IT operations are deterministic.
  tags:
  - Rapid7
  - Integration
  - ITSM
  - servicenow
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    RAPID7_API_KEY: RAPID7_API_KEY
    SERVICENOW_API_KEY: SERVICENOW_API_KEY
capability:
  consumes:
  - type: http
    namespace: rapid7
    baseUri: https://us.api.insight.rapid7.com
    description: Rapid7 API operations consumed by this integration.
    resources:
    - name: idr-v1-investigations
      path: /idr/v1/investigations
      operations:
      - name: listinvestigations
        method: GET
        description: List investigations to mirror.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: idr-v1-investigations-id-assignee
      path: /idr/v1/investigations/{id}/assignee
      operations:
      - name: setinvestigationassignee
        method: PUT
        description: Write the ServiceNow assignee back into IDR.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Path parameter id.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  - type: http
    namespace: servicenow
    baseUri: https://yourinstance.service-now.com
    description: ServiceNow Table API operations consumed by this integration.
    resources:
    - name: api-now-table-incident
      path: /api/now/table/incident
      operations:
      - name: createincident
        method: POST
        description: 'ServiceNow Table API: createIncident'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-now-table-incident-sys-id
      path: /api/now/table/incident/{sys_id}
      operations:
      - name: updateincident
        method: PATCH
        description: 'ServiceNow Table API: updateIncident'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sys_id
          in: path
          type: string
          description: Path parameter sys_id.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: rapid7-servicenow-mcp
    description: MCP adapter for the rapid7-servicenow integration.
    tools:
    - name: rapid7_servicenow
      description: Execute the rapid7 servicenow integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: rapid7-servicenow-rest
    port: 8080
    description: REST adapter for the rapid7-servicenow integration.
    resources:
    - path: /rapid7-servicenow
      name: rapid7-servicenow
      description: REST surface for the rapid7-servicenow integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the rapid7-servicenow integration.
        call: rapid7_servicenow
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
