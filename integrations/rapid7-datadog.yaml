naftiko: 1.0.0-alpha2
info:
  label: Forward Rapid7 InsightVM vulnerability findings into Datadog
  description: For each new or changed InsightVM vulnerability finding on an asset, emit a Datadog event tagged by asset, severity, and CVE so SREs and platform teams see vuln signal next to their infra telemetry without leaving Datadog.
  tags:
  - Rapid7
  - Integration
  - Observability
  - datadog
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    RAPID7_API_KEY: RAPID7_API_KEY
    DATADOG_API_KEY: DATADOG_API_KEY
capability:
  consumes:
  - type: http
    namespace: rapid7
    baseUri: https://us.api.insight.rapid7.com
    description: Rapid7 API operations consumed by this integration.
    resources:
    - name: api-3-assets
      path: /api/3/assets
      operations:
      - name: listassets
        method: GET
        description: List InsightVM assets.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: api-3-assets-id-vulnerabilities
      path: /api/3/assets/{id}/vulnerabilities
      operations:
      - name: listassetvulnerabilities
        method: GET
        description: List vulnerabilities on a given asset.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Path parameter id.
          required: true
  - type: http
    namespace: datadog
    baseUri: https://api.datadoghq.com
    description: Datadog Events API operations consumed by this integration.
    resources:
    - name: api-v1-events
      path: /api/v1/events
      operations:
      - name: createevent
        method: POST
        description: 'Datadog Events API: createEvent'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: rapid7-datadog-mcp
    description: MCP adapter for the rapid7-datadog integration.
    tools:
    - name: rapid7_datadog
      description: Execute the rapid7 datadog integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: rapid7-datadog-rest
    port: 8080
    description: REST adapter for the rapid7-datadog integration.
    resources:
    - path: /rapid7-datadog
      name: rapid7-datadog
      description: REST surface for the rapid7-datadog integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the rapid7-datadog integration.
        call: rapid7_datadog
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
