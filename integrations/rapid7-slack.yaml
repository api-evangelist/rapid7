naftiko: 1.0.0-alpha2
info:
  label: Post Rapid7 security alerts to Slack channels
  description: Push high-signal Rapid7 events (new critical InsightVM vuln on a crown-jewel asset, new InsightIDR investigation, InsightAppSec vulnerable finding) to the right Slack channel with a tight summary and a deep link back so the security team triages in chat.
  tags:
  - Rapid7
  - Integration
  - Collaboration
  - slack
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    RAPID7_API_KEY: RAPID7_API_KEY
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: rapid7
    baseUri: https://us.api.insight.rapid7.com
    description: Rapid7 API operations consumed by this integration.
    resources:
    - name: api-3-assets
      path: /api/3/assets
      operations:
      - name: listassets
        method: GET
        description: List vulnerable assets for the channel summary.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: idr-v1-investigations
      path: /idr/v1/investigations
      operations:
      - name: listinvestigations
        method: GET
        description: List investigations for the channel summary.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
  - type: http
    namespace: slack
    baseUri: https://slack.com
    description: Slack Web API operations consumed by this integration.
    resources:
    - name: api-chat-postmessage
      path: /api/chat.postMessage
      operations:
      - name: postmessage
        method: POST
        description: 'Slack Web API: postMessage'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: rapid7-slack-mcp
    description: MCP adapter for the rapid7-slack integration.
    tools:
    - name: rapid7_slack
      description: Execute the rapid7 slack integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: rapid7-slack-rest
    port: 8080
    description: REST adapter for the rapid7-slack integration.
    resources:
    - path: /rapid7-slack
      name: rapid7-slack
      description: REST surface for the rapid7-slack integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the rapid7-slack integration.
        call: rapid7_slack
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
