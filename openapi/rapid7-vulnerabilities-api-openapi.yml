components:
  schemas:
    ReadOnlyIdResource:
      description: The ID of the module
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
      readOnly: true
    Vulnerability:
      properties:
        id:
          type: string
          format: uuid
          description: The ID of the Vulnerability
          readOnly: true
        app:
          $ref: '#/components/schemas/ReadOnlyIdResource'
        root_cause:
          $ref: '#/components/schemas/RootCause'
        severity:
          type: string
          description: The severity of the Vulnerability
          enum:
          - SAFE
          - INFORMATIONAL
          - LOW
          - MEDIUM
          - HIGH
          - CRITICAL
        status:
          type: string
          description: The status of the Vulnerability
          enum:
          - UNREVIEWED
          - FALSE_POSITIVE
          - VERIFIED
          - IGNORED
          - REMEDIATED
          - DUPLICATE
        first_discovered:
          type: string
          description: The time the Vulnerability was first discovered
          example: '2021-08-03T14:07:37'
          readOnly: true
        last_discovered:
          type: string
          description: The time the Vulnerability was last discovered
          example: '2021-08-03T14:07:37'
          readOnly: true
        newly_discovered:
          type: boolean
          description: 'Indicates that the vulnerability has been found in the latest scan and has not been discovered before '
          readOnly: true
        variances:
          type: array
          description: Evidence found that indicates the presence of a Vulnerability
          items:
            $ref: '#/components/schemas/Variance'
          readOnly: true
        vector_string:
          type: string
          description: Textual representation of the metric values used to determine the CVSS score
          readOnly: true
        vulnerability_score:
          type: number
          format: double
          description: CVSS score which represents the severity of an information security vulnerability
          readOnly: true
        insight_ui_url:
          type: string
          description: Direct link to the Vulnerability on InsightAppSec UI. <b>Require InsightAppSec login before use.<b>
          readOnly: true
        updated_time:
          type: string
          format: date-time
          description: ${public-api.docs.models.vulnerability.properties.updated-time}
          readOnly: true
      title: Vulnerability
    StringReferenceResource:
      description: The ID of the attack
      properties:
        id:
          type: string
      readOnly: true
    ValidationErrors:
      properties:
        status:
          type: string
          description: A description of the type of error based on HTTP status code
          enum:
          - 100 CONTINUE
          - 101 SWITCHING_PROTOCOLS
          - 102 PROCESSING
          - 103 EARLY_HINTS
          - 103 CHECKPOINT
          - 200 OK
          - 201 CREATED
          - 202 ACCEPTED
          - 203 NON_AUTHORITATIVE_INFORMATION
          - 204 NO_CONTENT
          - 205 RESET_CONTENT
          - 206 PARTIAL_CONTENT
          - 207 MULTI_STATUS
          - 208 ALREADY_REPORTED
