      type:
        type: string
        example: directory
        description: The type of the file.
        enum:
        - file
        - directory
    description: ''
  ScanEngine:
    type: object
    required:
    - address
    - id
    - name
    - port
    properties:
      address:
        type: string
        example: corporate-scan-engine-001.acme.com
        description: The address the scan engine is hosted.
      contentVersion:
        type: string
        example: ''
        description: The content version of the scan engine.
        readOnly: true
      enginePools:
        type: array
        description: A list of identifiers of engine pools this engine is included in.
        readOnly: true
        items:
          type: integer
          format: int32
      id:
        type: integer
        format: int32
        example: 6
        description: The identifier of the scan engine.
      lastRefreshedDate:
        type: string
        example: ''
        description: The date the engine was last refreshed. Date format is in ISO 8601.
        readOnly: true
      lastUpdatedDate:
        type: string
        example: ''
        description: The date the engine was last updated. Date format is in ISO 8601.
        readOnly: true
      links:
        type: array
        description: Hypermedia links to corresponding or related resources.
        readOnly: true
        items:
          $ref: '#/definitions/Link'
      name:
        type: string
        example: Corporate Scan Engine 001
        description: The name of the scan engine.
      port:
        type: integer
        format: int32
        example: 40894
        description: The port used by the scan engine to communicate with the Security Console.
      productVersion:
        type: string
        example: ''
        description: The product version of the scan engine.
        readOnly: true
      sites:
        type: array
        description: A list of identifiers of each site the scan engine is assigned to.
        items:
          type: integer
          format: int32
      status:
        type: string
        example: ''
        description: "The scan engine status. Can be one of the following values: \n| Value                     | Description                                                                                | \n| ------------------------- | ------------------------------------------------------------------------------------------ | \n| `\"active\"`                | The scan engine is active.                                                                 | \n| `\"incompatible-version\"`  | The product version of the remote scan engine is not compatible with the Security Console. | \n| `\"not-responding\"`        | The scan engine is not responding to the Security Console.                                 | \n| `\"pending-authorization\"` | The Security Console is not yet authorized to connect to the scan engine.                  | \n| `\"unknown\"`               | The status of the scan engine is unknown.                                                  | \n"
        readOnly: true
        enum:
        - active
        - incompatible-version
        - not-responding
        - pending-authorization
        - unknown
    description: ''
  Resources«SiteCredential»:
    type: object
    properties:
      links:
        type: array
        description: Hypermedia links to corresponding or related resources.
        items:
          $ref: '#/definitions/Link'
      resources:
        type: array
        description: The resources returned.
        items:
          $ref: '#/definitions/SiteCredential'
    description: ''
  AssetHistory:
    type: object
    properties:
      date:
        type: string
        example: '2018-04-09T06:23:49Z'
        description: The date the asset information was collected or changed.
      description:
        type: string
        example: ''
        description: Additional information describing the change.
      scanId:
        type: integer
        format: int64
        example: 12
        description: If a scan-oriented change, the identifier of the corresponding scan the asset was scanned in.
      type:
        type: string
        example: SCAN
        description: "The type of change. May be one of: \n| Type                                | Source of Data                                              | \n| ----------------------------------- | ----------------------------------------------------------- | \n| `ASSET-IMPORT`, `EXTERNAL-IMPORT`   | External source such as the API                             | \n| `EXTERNAL-IMPORT-APPSPIDER`         | Rapid7 InsightAppSec (previously known as AppSpider)        | \n| `SCAN`                              | Scan engine scan                                            | \n| `AGENT-IMPORT`                      | Rapid7 Insight Agent                                        | \n| `ACTIVE-SYNC`                       | ActiveSync                                                  | \n| `SCAN-LOG-IMPORT`                   | Manual import of a scan log                                 | \n| `VULNERABILITY_EXCEPTION_APPLIED`   | Vulnerability exception applied                             | \n| `VULNERABILITY_EXCEPTION_UNAPPLIED` | Vulnerability exception unapplied                           |"
      user:
        type: string
        example: ''
        description: If a vulnerability exception change, the login name of the user that performed the operation.
      version:
        type: integer
        format: int32
        example: 8
        description: 'The version number of the change (a chronological incrementing number starting from 1). '
      vulnerabilityExceptionId:
        type: integer
        format: int32
        example: ''
        description: If a vulnerability exception change, the identifier of the vulnerability exception that caused the change.
    description: ''
