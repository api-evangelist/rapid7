  SiteCredential:
    type: object
    required:
    - account
    - name
    properties:
      account:
        example: ''
        description: "Specify the type of service to authenticate as well as all of the information required by that service. <div class=\"properties\"> \n<div class=\"property-info\"> \n<span class=\"property-name\">service</span> <span class=\"param-type\">string</span> \n<div class=\"param-enum\"> \n<span class=\"param-enum-value string\">\"as400\"</span> \n<span class=\"param-enum-value string\">\"cifs\"</span> \n<span class=\"param-enum-value string\">\"cifshash\"</span> \n<span class=\"param-enum-value string\">\"cvs\"</span> \n<span class=\"param-enum-value string\">\"db2\"</span> \n<span class=\"param-enum-value string\">\"ftp\"</span> \n<span class=\"param-enum-value string\">\"http\"</span> \n<span class=\"param-enum-value string\">\"ms-sql\"</span> \n<span class=\"param-enum-value string\">\"mysql\"</span> \n<span class=\"param-enum-value string\">\"notes\"</span> \n<span class=\"param-enum-value string\">\"oracle\"</span> \n<span class=\"param-enum-value string\">\"pop\"</span> \n<span class=\"param-enum-value string\">\"postgresql\"</span> \n<span class=\"param-enum-value string\">\"remote-exec\"</span> \n<span class=\"param-enum-value string\">\"snmp\"</span> \n<span class=\"param-enum-value string\">\"snmpv3\"</span> \n<span class=\"param-enum-value string\">\"ssh\"</span> \n<span class=\"param-enum-value string\">\"ssh-key\"</span> \n<span class=\"param-enum-value string\">\"sybase\"</span> \n<span class=\"param-enum-value string\">\"telnet\"</span> \n</div> \n<div class=\"redoc-markdown-block\">The type of service to authenticate with.</div>\n</div> \n</div>\n\nThe following are the names of the valid values for service: \n| Value         | Service                                         | \n| ------------- | ----------------------------------------------- | \n| `as400`       | IBM AS/400                                      | \n| `cifs`        | Microsoft Windows/Samba (SMB/CIFS)              | \n| `cifshash`    | Microsoft Windows/Samba LM/NTLM Hash (SMB/CIFS) | \n| `cvs`         | Concurrent Versioning System (CVS)              | \n| `db2`         | DB2                                             | \n| `ftp`         | File Transfer Protocol (FTP)                    | \n| `http`        | Web Site HTTP Authentication                    | \n| `ms-sql`      | Microsoft SQL Server                            | \n| `mysql`       | MySQL Server                                    | \n| `notes`       | Lotus Notes/Domino                              | \n| `oracle`      | Oracle                                          | \n| `pop`         | Post Office Protocol (POP)                      | \n| `postgresql`  | PostgreSQL                                      | \n| `remote-exec` | Remote Execution                                | \n| `snmp`        | Simple Network Management Protocol v1/v2c       | \n| `snmpv3`      | Simple Network Management Protocol v3           | \n| `ssh`         | Secure Shell (SSH)                              | \n| `ssh-key`     | Secure Shell (SSH) Public Key                   | \n| `sybase`      | Sybase SQL Server                               | \n| `telnet`      | Telnet                                          | \n\n<p>The following is a specification of supported credential properties for each type of service. These properties are to be specified within the <code>account</code> object.</p>\n\n`as400` supported properties:\n<div class=\"properties\"> \n<div class=\"property-info\"> \n<span class=\"property-name\">domain</span> <span class=\"param-type\">string</span> \n<div class=\"redoc-markdown-block\"><p>The address of the domain.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">username</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The user name for the account that will be used for authenticating.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">password</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The password for the account that will be used for authenticating. <strong>Note: This property is not returned in responses for security.</strong></p></div>\n</div> \n</div>\n\n`cifs` supported properties:\n<div class=\"properties\"> \n<div class=\"property-info\"> \n<span class=\"property-name\">domain</span> <span class=\"param-type\">string</span> \n<div class=\"redoc-markdown-block\"><p>The address of the domain.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">username</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The user name for the account that will be used for authenticating.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">password</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The password for the account that will be used for authenticating. <strong>Note: This property is not returned in responses for security.</strong></p></div>\n</div> \n</div>\n\n`cifshash` supported properties:\n<div class=\"properties\"> \n<div class=\"property-info\"> \n<span class=\"property-name\">domain</span> <span class=\"param-type\">string</span> \n<div class=\"redoc-markdown-block\"><p>The address of the domain.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">username</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The user name for the account that will be used for authenticating.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">ntlmHash</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The NTLM password hash. <strong>Note: This property is not returned in responses for security.</strong></p></div>\n</div> \n</div>\n\n`cvs` supported properties:\n<div class=\"properties\"> \n<div class=\"property-info\"> \n<span class=\"property-name\">domain</span> <span class=\"param-type\">string</span> \n<div class=\"redoc-markdown-block\"><p>The address of the domain.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">username</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The user name for the account that will be used for authenticating.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">password</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The password for the account that will be used for authenticating. <strong>Note: This property is not returned in responses for security.</strong></p></div>\n</div> \n</div>\n\n`db2` supported properties:\n<div class=\"properties\"> \n<div class=\"property-info\"> \n<span class=\"property-name\">database</span> <span class=\"param-type\">string</span> \n<div class=\"redoc-markdown-block\"><p>The name of the database.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">username</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The user name for the account that will be used for authenticating.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">password</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The password for the account that will be used for authenticating. <strong>Note: This property is not returned in responses for security.</strong></p></div>\n</div> \n</div>\n\n`ftp` supported properties:\n<div class=\"properties\"> \n<div class=\"property-info\"> \n<span class=\"property-name\">username</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The user name for the account that will be used for authenticating.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">password</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The password for the account that will be used for authenticating. <strong>Note: This property is not returned in responses for security.</strong></p></div>\n</div> \n</div>\n\n`http` supported properties:\n<div class=\"properties\"> \n<div class=\"property-info\"> \n<span class=\"property-name\">realm</span> <span class=\"param-type\">string</span> \n<div class=\"redoc-markdown-block\"><p>The realm.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">username</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The user name for the account that will be used for authenticating.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">password</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The password for the account that will be used for authenticating. <strong>Note: This property is not returned in responses for security.</strong></p></div>\n</div> \n</div>\n\n`ms-sql` supported properties:\n<div class=\"properties\"> \n<div class=\"property-info\"> \n<span class=\"property-name\">database</span> <span class=\"param-type\">string</span> \n<div class=\"redoc-markdown-block\"><p>The name of the database. If not specified, a default database name will be used during authentication.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">useWindowsAuthentication</span> <span class=\"param-type\">boolean</span> \n<div class=\"redoc-markdown-block\">\n<p>\nBoolean flag signaling whether to connect to the database using Windows authentication. When set to <code>true</code>, Windows authentication is attempted; when set to <code>false</code>, SQL authentication is attempted.</p>\n</div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">domain</span> <span class=\"param-type\">string</span> \n<div class=\"redoc-markdown-block\"><p>The address of the domain. This property cannot be specified unless property <code>useWindowsAuthentication</code> is set to <code>true</code>.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">username</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The user name for the account that will be used for authenticating.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">password</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The password for the account that will be used for authenticating. <strong>Note: This property is not returned in responses for security.</strong></p></div>\n</div> \n</div>\n\n`mysql` supported properties:\n<div class=\"properties\"> \n<div class=\"property-info\"> \n<span class=\"property-name\">database</span> <span class=\"param-type\">string</span> \n<div class=\"redoc-markdown-block\"><p>The name of the database. If not specified, a default database name will be used during authentication.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">username</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The user name for the account that will be used for authenticating.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">password</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The Notes ID password. <strong>Note: This property is not returned in responses for security.</strong></p></div>\n</div> \n</div>\n\n`notes` supported properties:\n<div class=\"properties\"> \n<div class=\"property-info\"> \n<span class=\"property-name\">notesIDPassword</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The password for the account that will be used for authenticating. <strong>Note: This property is not returned in responses for security.</strong></p></div>\n</div> \n</div>\n\n`oracle` supported properties:\n<div class=\"properties\"> \n<div class=\"property-info\"> \n<span class=\"property-name\">sid</span> <span class=\"param-type\">string</span> \n<div class=\"redoc-markdown-block\"><p>The name of the database. If not specified, a default database name will be used during authentication.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">username</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The user name for the account that will be used for authenticating.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">password</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The password for the account that will be used for authenticating. <strong>Note: This property is not returned in responses for security.</strong></p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">enumerateSids</span> <span class=\"param-type\">boolean</span> \n<div class=\"redoc-markdown-block\">\n<p>\nBoolean flag instructing the scan engine to attempt to enumerate SIDs from your environment. If set to <code>true</code>, set the Oracle Net Listener password in property <code>oracleListenerPassword</code>.</p>\n</div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">oracleListenerPassword</span> <span class=\"param-type\">string</span> \n<div class=\"redoc-markdown-block\"><p>The Oracle Net Listener password. Used to enumerate SIDs from your environment.</p></div>\n</div> \n</div>\n\n`pop` supported properties:\n<div class=\"properties\"> \n<div class=\"property-info\"> \n<span class=\"property-name\">username</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The user name for the account that will be used for authenticating.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">password</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The password for the account that will be used for authenticating. <strong>Note: This property is not returned in responses for security.</strong></p></div>\n</div> \n</div>\n\n`postgresql` supported properties:\n<div class=\"properties\"> \n<div class=\"property-info\"> \n<span class=\"property-name\">database</span> <span class=\"param-type\">string</span> \n<div class=\"redoc-markdown-block\"><p>The name of the database.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">username</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The user name for the account that will be used for authenticating.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">password</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The password for the account that will be used for authenticating. <strong>Note: This property is not returned in responses for security.</strong></p></div>\n</div> \n</div>\n\n`remote-exec` supported properties:\n<div class=\"properties\"> \n<div class=\"property-info\"> \n<span class=\"property-name\">username</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The user name for the account that will be used for authenticating.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">password</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The password for the account that will be used for authenticating. <strong>Note: This property is not returned in responses for security.</strong></p></div>\n</div> \n</div>\n\n`snmp` supported properties:\n<div class=\"properties\"> \n<div class=\"property-info\"> \n<span class=\"property-name\">communityName</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The community name that will be used for authenticating. <strong>Note: This property is not returned in responses for security.</strong></p></div>\n</div> \n</div>\n\n`snmpv3` supported properties:\n<div class=\"properties\"> \n<div class=\"property-info\"> \n<span class=\"property-name\">authenticationType</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"param-enum\"> \n<span class=\"param-enum-value string\">\"no-authentication\"</span> \n<span class=\"param-enum-value string\">\"md5\"</span> \n<span class=\"param-enum-value string\">\"sha\"</span> \n</div> \n<div class=\"redoc-markdown-block\"><p>The authentication protocols available to use in SNMP v3.</p></div>\n</div>\n<div class=\"property-info\"> \n<span class=\"property-name\">username</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The user name for the account that will be used for authenticating.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">password</span> <span class=\"param-type\">string</span> \n<div class=\"redoc-markdown-block\">\n<p>\nThe password for the account that will be used for authenticating. Is required when the property <code>authenticationType</code> is set to valid value other than <code>\"no-authentication\"</code>. <strong>Note: This property is not returned in responses for security.</strong></p>\n</div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">privacyType</span> <span class=\"param-type\">string</span> \n<div class=\"param-enum\"> \n<span class=\"param-enum-value string\">\"no-privacy\"</span> \n<span class=\"param-enum-value string\">\"des\"</span> \n<span class=\"param-enum-value string\">\"aes-128\"</span> \n<span class=\"param-enum-value string\">\"aes-192\"</span> \n<span class=\"param-enum-value string\">\"aes-192-with-3-des-key-extension\"</span> \n<span class=\"param-enum-value string\">\"aes-256\"</span> \n<span class=\"param-enum-value string\">\"aes-265-with-3-des-key-extension\"</span> \n</div> \n<div class=\"redoc-markdown-block\"><p>The privacy protocols available to use in SNMP v3.</p></div>\n</div>\n<div class=\"property-info\"> \n<span class=\"property-name\">privacyPassword</span> <span class=\"param-type\">string</span> \n<div class=\"redoc-markdown-block\">\n<p>\nThe privacy password for the account that will be used for authenticating. Is required when the property <code>authenticationType</code> is set to valid value other than <code>\"no-authentication\"</code> and when the <code>privacyType</code> is set to a valid value other than code>\"no-privacy\"</code>. <strong>Note: This property is not returned in responses for security.</strong></p>\n</div>\n</div> \n</div>\n\n`ssh` supported properties:\n<div class=\"properties\"> \n<div class=\"property-info\"> \n<span class=\"property-name\">username</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The user name for the account that will be used for authenticating.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">password</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The password for the account that will be used for authenticating. <strong>Note: This property is not returned in responses for security.</strong></p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">permissionElevation</span> <span class=\"param-type\">string</span> \n<div class=\"param-enum\"> \n<span class=\"param-enum-value string\">\"none\"</span> \n<span class=\"param-enum-value string\">\"sudo\"</span> \n<span class=\"param-enum-value string\">\"sudosu\"</span> \n<span class=\"param-enum-value string\">\"su\"</span> \n<span class=\"param-enum-value string\">\"pbrun\"</span> \n<span class=\"param-enum-value string\">\"privileged-exec\"</span> \n</div> \n<div class=\"redoc-markdown-block\">\n<p>\nElevate scan engine permissions to administrative or root access, which is necessary to obtain certain data during the scan. Defaults to <code>\"none\"</code> if not specified. </p>\n</div>\n</div>\n<div class=\"property-info\"> \n<span class=\"property-name\">permissionElevationUsername</span> <span class=\"param-type\">string</span> \n<div class=\"redoc-markdown-block\">\n<p>\nThe user name for the account with elevated permissions. This property must not be specified when the property <code>permissionElevation</code> is set to either <code>\"none\"</code> or <code>\"pbrun\"</code>; otherwise the property is required.</p>\n</div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">password</span> <span class=\"param-type\">string</span> \n<div class=\"redoc-markdown-block\">\n<p>\nThe password for the account with elevated permissions. This property must not be specified when the property <code>permissionElevation</code> is set to either <code>\"none\"</code> or <code>\"pbrun\"</code>; otherwise the property is required.<strong>Note: This property is not returned in responses for security.</strong></p>\n</div>\n</div> \n</div>\n\n`ssh-key` supported properties:\n<div class=\"properties\"> \n<div class=\"property-info\"> \n<span class=\"property-name\">username</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The user name for the account that will be used for authenticating.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">privateKeyPassword</span> <span class=\"param-type\">string</span> \n<div class=\"redoc-markdown-block\"><p>The password for private key. <strong>Note: This property is not returned in responses for security.</strong></p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">pemKey</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The PEM-format private key. <strong>Note: This property is not returned in responses for security.</strong></p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">permissionElevation</span> <span class=\"param-type\">string</span> \n<div class=\"param-enum\"> \n<span class=\"param-enum-value string\">\"none\"</span> \n<span class=\"param-enum-value string\">\"sudo\"</span> \n<span class=\"param-enum-value string\">\"sudosu\"</span> \n<span class=\"param-enum-value string\">\"su\"</span> \n<span class=\"param-enum-value string\">\"pbrun\"</span> \n<span class=\"param-enum-value string\">\"privileged-exec\"</span> \n</div> \n<div class=\"redoc-markdown-block\">\n<p>\nElevate scan engine permissions to administrative or root access, which is necessary to obtain certain data during the scan. Defaults to <code>\"none\"</code> if not specified. </p>\n</div>\n</div>\n<div class=\"property-info\"> \n<span class=\"property-name\">permissionElevationUsername</span> <span class=\"param-type\">string</span> \n<div class=\"redoc-markdown-block\">\n<p>\nThe user name for the account with elevated permissions. This property must not be specified when the property <code>permissionElevation</code> is set to either <code>\"none\"</code> or <code>\"pbrun\"</code>; otherwise the property is required.</p>\n</div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">password</span> <span class=\"param-type\">string</span> \n<div class=\"redoc-markdown-block\">\n<p>\nThe password for the account with elevated permissions. This property must not be specified when the property <code>permissionElevation</code> is set to either <code>\"none\"</code> or <code>\"pbrun\"</code>; otherwise the property is required.<strong>Note: This property is not returned in responses for security.</strong></p>\n</div>\n</div> \n</div>\n\n`sybase` supported properties:\n<div class=\"properties\"> \n<div class=\"property-info\"> \n<span class=\"property-name\">database</span> <span class=\"param-type\">string</span> \n<div class=\"redoc-markdown-block\"><p>The name of the database. If not specified, a default database name will be used during authentication.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">useWindowsAuthentication</span> <span class=\"param-type\">boolean</span> \n<div class=\"redoc-markdown-block\">\n<p>\nBoolean flag signaling whether to connect to the database using Windows authentication. When set to <code>true</code>, Windows authentication is attempted; when set to <code>false</code>, SQL authentication is attempted.</p>\n</div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">domain</span> <span class=\"param-type\">string</span> \n<div class=\"redoc-markdown-block\"><p>The address of the domain. This property cannot be specified unless property <code>useWindowsAuthentication</code> is set to <code>true</code>.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">username</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The user name for the account that will be used for authenticating.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">password</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The password for the account that will be used for authenticating. <strong>Note: This property is not returned in responses for security.</strong></p></div>\n</div> \n</div>\n\n`telnet` supported properties:\n<div class=\"properties\"> \n<div class=\"property-info\"> \n<span class=\"property-name\">username</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The user name for the account that will be used for authenticating.</p></div>\n</div> \n<div class=\"property-info\"> \n<span class=\"property-name\">password</span> <span class=\"param-type\">string</span> <span _ngcontent-c21 class=\"param-required\">Required</span> \n<div class=\"redoc-markdown-block\"><p>The password for the account that will be used for authenticating. <strong>Note: This property is not returned in responses for security.</strong></p></div>\n</div> \n</div>\n\n"
