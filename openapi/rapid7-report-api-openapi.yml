        enum:
        - day
        - month
        - year
      from:
        type: string
        example: ''
        description: The start date of the trend, which can either be a duration or a specific date and time.
        enum:
        - P1Y
        - P6M
        - P3M
        - P1M
        - <date>
      interval:
        type: integer
        format: int32
        example: 7
        description: 'If `from` is a custom date the interval between reporting periods. '
      to:
        type: string
        example: ''
        description: The end date of the trend (empty if `from` is a duration).
    description: ''
  ReportInstance:
    type: object
    properties:
      generated:
        type: string
        example: '2018-06-01T18:56:03Z'
        description: The date the report finished generation.
      id:
        type: integer
        format: int32
        example: 5
        description: The identifier of the report instance.
      links:
        type: array
        description: Hypermedia links to corresponding or related resources.
        readOnly: true
        items:
          $ref: '#/definitions/Link'
      size:
        example: ''
        description: The size of the report, uncompressed.
        $ref: '#/definitions/ReportSize'
      status:
        type: string
        example: complete
        description: The status of the report generation process.
        enum:
        - aborted
        - failed
        - complete
        - running
        - unknown
      uri:
        type: string
        example: https://hostname:3780/reports/...
        description: The URI of the report accessible through the web console. Refer to the `Download` relation hyperlink for a download URI.
    description: ''
  RiskTrendResource:
    type: object
    properties:
      allAssets:
        example: ''
        description: Trend settings for a trend across all assets in the scope of the report.
        $ref: '#/definitions/RiskTrendAllAssetsResource'
      assetGroupMembership:
        type: string
        example: historical
        description: Whether all asset groups in the history of deployment or those as of the report generation time are to be included.
        enum:
        - historical
        - generation
      assetGroups:
        type: string
        example: total
        description: Whether to include a trend for the 5 highest-risk asset groups in the scope of the report (either the average or total risk). Only allowed if asset groups are specified in the report scope.
        enum:
        - average
        - total
      assets:
        type: boolean
        example: true
        description: Whether to include a trend for the 5 highest-risk assets in the scope of the report.
      from:
        type: string
        example: P3M
        description: The start date of the risk trend, which can either be a duration or a specific date and time.
        enum:
        - P1Y
        - P6M
        - P3M
        - P1M
        - <date>
      sites:
        type: string
        example: average
        description: Whether to include a trend for the 5 highest-risk sites in the scope of the report (either the average or total risk). Only allowed if sites are specified in the report scope.
        enum:
        - average
        - total
      tagMembership:
        type: string
        example: historical
        description: Whether all assets tagged in the history of deployment or those tagged as of the report generation time are to be included.
        enum:
        - historical
        - generation
      tags:
        type: string
        example: average
        description: Whether to include a trend for the 5 highest-risk tags for assets in the scope of the report (either the average or total risk). Only allowed if tags are specified in the report scope.
        enum:
        - average
        - total
      to:
        type: string
        example: ''
        description: The end date of the risk trend (empty if `from` is a duration).
    description: ''
