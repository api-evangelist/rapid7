        type: string
        example: admin
        description: Database user name. Only used when the format is `"database-export"`.
    description: ''
  ReportFrequency:
    type: object
    properties:
      nextRuntimes:
        type: array
        description: The next scheduled run-times for generation of the report when type is `schedule`.
        readOnly: true
        items:
          type: string
      repeat:
        example: ''
        description: How often the report generates when type is `schedule`.
        $ref: '#/definitions/ReportRepeat'
      start:
        type: string
        example: '2018-03-01T04:31:56Z'
        description: When the report starts generating when type is `schedule`.
      type:
        type: string
        example: schedule
        description: The frequency to generate the report. `schedule` generates the report every scheduled time interval, and requires the `repeat` and `start` properties to be specified. `scan` generates the report after any scan of any element in the scope of the report. `none` does not generate the report automatically. Defaults to `none`.
        enum:
        - schedule
        - scan
        - none
    description: ''
  PageOf«Report»:
    type: object
    properties:
      links:
        type: array
