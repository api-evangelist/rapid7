definitions:
  File:
    type: object
    required:
    - name
    - type
    properties:
      attributes:
        type: array
        description: Attributes detected on the file.
        items:
          $ref: '#/definitions/Configuration'
      name:
        type: string
        example: ADMIN$
        description: The name of the file.
      size:
        type: integer
        format: int64
        example: -1
        description: The size of the regular file (in bytes). If the file is a directory, no value is returned.
      type:
        type: string
        example: directory
        description: The type of the file.
        enum:
        - file
        - directory
    description: ''
  ReferenceWithEndpointIDLink:
    type: object
    properties:
      links:
        type: array
        description: Hypermedia links to corresponding or related resources.
        readOnly: true
        items:
          $ref: '#/definitions/Link'
      port:
        type: integer
        format: int32
        example: 22
        description: The port of the service.
      protocol:
        type: string
        example: tcp
        description: The protocol of the service.
        enum:
        - ip
        - icmp
        - igmp
        - ggp
        - tcp
        - pup
        - udp
        - idp
        - esp
        - nd
        - raw
    description: ''
  Configuration:
    type: object
    required:
    - name
    properties:
      name:
        type: string
        example: <name>
        description: The name of the configuration value.
      value:
        type: string
        example: <value>
        description: The configuration value.
    description: ''
  UniqueId:
    type: object
    required:
    - id
    properties:
      id:
        type: string
        example: c56b2c59-4e9b-4b89-85e2-13f8146eb071
        description: The unique identifier.
      source:
        type: string
        example: WQL
        description: The source of the unique identifier.
    description: ''
  AssetHistory:
    type: object
    properties:
      date:
        type: string
        example: '2018-04-09T06:23:49Z'
        description: The date the asset information was collected or changed.
      description:
        type: string
        example: ''
        description: Additional information describing the change.
      scanId:
        type: integer
        format: int64
        example: 12
        description: If a scan-oriented change, the identifier of the corresponding scan the asset was scanned in.
      type:
        type: string
        example: SCAN
        description: "The type of change. May be one of: \n| Type                                | Source of Data                                              | \n| ----------------------------------- | ----------------------------------------------------------- | \n| `ASSET-IMPORT`, `EXTERNAL-IMPORT`   | External source such as the API                             | \n| `EXTERNAL-IMPORT-APPSPIDER`         | Rapid7 InsightAppSec (previously known as AppSpider)        | \n| `SCAN`                              | Scan engine scan                                            | \n| `AGENT-IMPORT`                      | Rapid7 Insight Agent                                        | \n| `ACTIVE-SYNC`                       | ActiveSync                                                  | \n| `SCAN-LOG-IMPORT`                   | Manual import of a scan log                                 | \n| `VULNERABILITY_EXCEPTION_APPLIED`   | Vulnerability exception applied                             | \n| `VULNERABILITY_EXCEPTION_UNAPPLIED` | Vulnerability exception unapplied                           |"
      user:
        type: string
        example: ''
        description: If a vulnerability exception change, the login name of the user that performed the operation.
      version:
        type: integer
        format: int32
        example: 8
        description: 'The version number of the change (a chronological incrementing number starting from 1). '
      vulnerabilityExceptionId:
        type: integer
        format: int32
        example: ''
        description: If a vulnerability exception change, the identifier of the vulnerability exception that caused the change.
    description: ''
  ReferencesWith«WebApplicationID,Link»:
    type: object
    properties:
      links:
        type: array
        description: Hypermedia links to corresponding or related resources.
        items:
          $ref: '#/definitions/Link'
      resources:
        type: array
        description: The identifiers of the associated resources.
        items:
          type: integer
          format: int64
    description: ''
  SwaggerSearchCriteriaFilter:
    type: object
    properties:
      field:
        type: string
        example: ''
        description: The filter field for the search criteria.
      lower:
        type: object
        example: ''
        description: The lower value to match in a range criteria.
      operator:
        type: string
        example: ''
        description: The operator on how to match the search criteria.
      upper:
