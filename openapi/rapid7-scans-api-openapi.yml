              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
      - Scans
      summary: Submit Scan
      description: Submit a new Scan
      operationId: submit-scan
      requestBody:
        content:
