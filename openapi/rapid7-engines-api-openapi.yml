components:
  schemas:
    Engine:
      properties:
        id:
          type: string
          format: uuid
          description: The ID of the Engine
          readOnly: true
        name:
          type: string
          description: The name of the Engine
          maxLength: 200
          minLength: 1
        engine_group:
          $ref: '#/components/schemas/engine_group'
        status:
          type: string
          description: The status of the Engine
          enum:
          - INITIALIZING
          - LICENSING
          - TERMINATING
          - IDLE
          - OFFLINE
          - SCANNING
          - UPGRADING
          - PARKED
          - FAILED
          readOnly: true
        failure_reason:
          type: string
          description: The reason the Engine may have failed
          enum:
          - TERMINATION_FAILED
          - INITIALIZATION_FAILED
          - UPGRADE_FAILED
          - GENERAL_FAILURE
          readOnly: true
        latest_version:
          type: boolean
          description: A read only flag which indicates if the Engine is latest version
          readOnly: true
        upgradeable:
          type: boolean
          description: A read only flag which indicates if the Engine is capable of upgrading
          readOnly: true
        auto_upgrade:
          type: boolean
          description: 'A flag which can be set to mark the Engine for auto upgrade '
      required:
      - auto_upgrade
      - name
      title: Engine
    ValidationErrors:
      properties:
        status:
          type: string
          description: A description of the type of error based on HTTP status code
          enum:
          - 100 CONTINUE
          - 101 SWITCHING_PROTOCOLS
          - 102 PROCESSING
          - 103 EARLY_HINTS
          - 103 CHECKPOINT
          - 200 OK
          - 201 CREATED
          - 202 ACCEPTED
          - 203 NON_AUTHORITATIVE_INFORMATION
          - 204 NO_CONTENT
          - 205 RESET_CONTENT
          - 206 PARTIAL_CONTENT
          - 207 MULTI_STATUS
          - 208 ALREADY_REPORTED
          - 226 IM_USED
          - 300 MULTIPLE_CHOICES
          - 301 MOVED_PERMANENTLY
          - 302 FOUND
          - 302 MOVED_TEMPORARILY
          - 303 SEE_OTHER
          - 304 NOT_MODIFIED
          - 305 USE_PROXY
          - 307 TEMPORARY_REDIRECT
          - 308 PERMANENT_REDIRECT
          - 400 BAD_REQUEST
          - 401 UNAUTHORIZED
          - 402 PAYMENT_REQUIRED
          - 403 FORBIDDEN
          - 404 NOT_FOUND
          - 405 METHOD_NOT_ALLOWED
          - 406 NOT_ACCEPTABLE
          - 407 PROXY_AUTHENTICATION_REQUIRED
          - 408 REQUEST_TIMEOUT
          - 409 CONFLICT
          - 410 GONE
          - 411 LENGTH_REQUIRED
          - 412 PRECONDITION_FAILED
