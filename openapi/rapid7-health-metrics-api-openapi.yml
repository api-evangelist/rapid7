components:
  schemas:
    PageMetadata:
      required:
      - index
      - size
      - total_data
      - total_pages
      type: object
      properties:
        index:
          type: integer
          description: 'The 0 based index of the page retrieved. '
          format: int32
          example: 0
        size:
          type: integer
          description: 'The size of the page requested. '
          format: int32
          example: 20
        total_pages:
          type: integer
          description: 'The total number of pages available with the given filter parameters. '
          format: int32
          example: 1
        total_data:
          type: integer
          description: 'The total number of results available with the given filter parameters. '
          format: int64
          example: 15
      description: The pagination parameters used to generate this page result. Depending on the API, additional parameters may be dynamically present.
    ErrorResponse:
      required:
      - message
      type: object
      properties:
        message:
          type: string
          description: A human-readable message describing the error that occurred.
          example: A human-readable message describing the error that occurred.
        correlation_id:
          type: string
          description: An identifier that uniquely identifies the failed request.
          example: 6b6503c8-2da9-41c0-94cb-2f34069e00cd
    Page:
      required:
      - data
      - metadata
      type: object
      properties:
        data:
          type: array
          description: The list of data that matches the pagination parameters. If no results match this will be an empty list.
          items:
            type: object
            description: The list of data that matches the pagination parameters. If no results match this will be an empty list.
        metadata:
          $ref: '#/components/schemas/PageMetadata'
