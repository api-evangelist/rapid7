components:
  schemas:
    ValidationErrors:
      properties:
        status:
          type: string
          description: A description of the type of error based on HTTP status code
          enum:
          - 100 CONTINUE
          - 101 SWITCHING_PROTOCOLS
          - 102 PROCESSING
          - 103 EARLY_HINTS
          - 103 CHECKPOINT
          - 200 OK
          - 201 CREATED
          - 202 ACCEPTED
          - 203 NON_AUTHORITATIVE_INFORMATION
          - 204 NO_CONTENT
          - 205 RESET_CONTENT
          - 206 PARTIAL_CONTENT
          - 207 MULTI_STATUS
          - 208 ALREADY_REPORTED
          - 226 IM_USED
          - 300 MULTIPLE_CHOICES
          - 301 MOVED_PERMANENTLY
          - 302 FOUND
          - 302 MOVED_TEMPORARILY
          - 303 SEE_OTHER
          - 304 NOT_MODIFIED
          - 305 USE_PROXY
          - 307 TEMPORARY_REDIRECT
          - 308 PERMANENT_REDIRECT
          - 400 BAD_REQUEST
          - 401 UNAUTHORIZED
          - 402 PAYMENT_REQUIRED
          - 403 FORBIDDEN
          - 404 NOT_FOUND
          - 405 METHOD_NOT_ALLOWED
          - 406 NOT_ACCEPTABLE
          - 407 PROXY_AUTHENTICATION_REQUIRED
          - 408 REQUEST_TIMEOUT
          - 409 CONFLICT
          - 410 GONE
          - 411 LENGTH_REQUIRED
          - 412 PRECONDITION_FAILED
          - 413 PAYLOAD_TOO_LARGE
          - 413 REQUEST_ENTITY_TOO_LARGE
          - 414 URI_TOO_LONG
          - 414 REQUEST_URI_TOO_LONG
          - 415 UNSUPPORTED_MEDIA_TYPE
          - 416 REQUESTED_RANGE_NOT_SATISFIABLE
          - 417 EXPECTATION_FAILED
          - 418 I_AM_A_TEAPOT
          - 419 INSUFFICIENT_SPACE_ON_RESOURCE
          - 420 METHOD_FAILURE
          - 421 DESTINATION_LOCKED
          - 422 UNPROCESSABLE_ENTITY
          - 423 LOCKED
          - 424 FAILED_DEPENDENCY
          - 425 TOO_EARLY
          - 426 UPGRADE_REQUIRED
          - 428 PRECONDITION_REQUIRED
          - 429 TOO_MANY_REQUESTS
          - 431 REQUEST_HEADER_FIELDS_TOO_LARGE
          - 451 UNAVAILABLE_FOR_LEGAL_REASONS
          - 500 INTERNAL_SERVER_ERROR
          - 501 NOT_IMPLEMENTED
          - 502 BAD_GATEWAY
          - 503 SERVICE_UNAVAILABLE
          - 504 GATEWAY_TIMEOUT
          - 505 HTTP_VERSION_NOT_SUPPORTED
          - 506 VARIANT_ALSO_NEGOTIATES
          - 507 INSUFFICIENT_STORAGE
          - 508 LOOP_DETECTED
          - 509 BANDWIDTH_LIMIT_EXCEEDED
          - 510 NOT_EXTENDED
          - 511 NETWORK_AUTHENTICATION_REQUIRED
          readOnly: true
        message:
          type: string
          description: A description of the error
          readOnly: true
        errorCode:
          type: string
          description: An optional code which may help support indicate the underlying cause of the error
          enum:
          - E1
          - E2
          - E3
          - E4
          - E5
          - E6
          - E7
          - E8
          - E9
          - E10
          - E11
          - E12
          - E13
          - E14
          - E15
          - E16
          - E17
          - E18
          - E19
          - E20
          - E22
          - E23
          - E24
          - E25
          - E26
          - E27
          - E28
          - E999
          readOnly: true
        errors:
          type: array
          description: A list of validation errors, when the HTTP status code is 422
          items:
            $ref: '#/components/schemas/ValidationError'
          readOnly: true
      title: ValidationErrors
    Link:
      properties:
        rel:
          type: string
        href:
          type: string
        profile:
          type: string
        name:
          type: string
      readOnly: true
    PageMetadata:
      properties:
        index:
          type: integer
          format: int64
        size:
          type: integer
          format: int64
        sort:
          type: string
        total_data:
          type: integer
          format: int64
        total_pages:
          type: integer
          format: int64
        page_token:
          type: string
    Frequency:
      description: The frequency at which the Blackout applies. Should not be included if a rrule has been provided.
      properties:
        type:
          type: string
          description: The type of the Frequency
          enum:
          - ONCE
          - HOURLY
          - DAILY
          - WEEKLY
          - MONTHLY
        interval:
          type: integer
          format: int32
          description: The interval of the Frequency
      title: Frequency
    ReferenceResource:
      description: The last editor of the comment
      properties:
        id:
          type: string
          format: uuid
      readOnly: true
      required:
      - id
    ValidationError:
      properties:
        type:
          type: string
          description: The type of the validation error
          enum:
          - OBJECT
          - PROPERTY
          readOnly: true
        context:
          type: string
          description: An optional contextual indicator of a part of the request which failed validation
          readOnly: true
        explanation:
          type: string
          description: Details of the validation error
          readOnly: true
    Blackout:
      properties:
        id:
          type: string
          format: uuid
          description: The ID of the Blackout
          readOnly: true
        name:
          type: string
          description: The name of the Blackout
          maxLength: 200
          minLength: 1
        scope:
          type: string
          description: The scope of the Blackout
          enum:
          - APP
          - GLOBAL
          readOnly: true
        enabled:
          type: boolean
          description: The enabled property of the Blackout
        active:
          type: boolean
          description: The current active status of the Blackout
          readOnly: true
        app:
          $ref: '#/components/schemas/ReferenceResource'
        first_start:
          type: string
          format: date-time
          description: The first start date and time of the Blackout
        first_end:
          type: string
          format: date-time
          description: The first end date and time of the Blackout
        last_start:
          type: string
          format: date-time
          description: The last start date and time of the Blackout
        frequency:
          $ref: '#/components/schemas/Frequency'
        rrule:
          type: string
          description: The rrule describes how (and if) the blackout should repeat. Should not be included if a frequency has been provided.
      required:
      - enabled
      - first_end
      - first_start
      - name
      title: Blackout
    EntityModelBlackout:
      properties:
        id:
          type: string
          format: uuid
          description: The ID of the Blackout
          readOnly: true
        name:
          type: string
          description: The name of the Blackout
          maxLength: 200
          minLength: 1
        scope:
          type: string
          description: The scope of the Blackout
          enum:
          - APP
          - GLOBAL
          readOnly: true
        enabled:
          type: boolean
          description: The enabled property of the Blackout
        active:
          type: boolean
          description: The current active status of the Blackout
          readOnly: true
        app:
          $ref: '#/components/schemas/ReferenceResource'
        first_start:
          type: string
          format: date-time
          description: The first start date and time of the Blackout
        first_end:
          type: string
          format: date-time
          description: The first end date and time of the Blackout
        last_start:
          type: string
          format: date-time
          description: The last start date and time of the Blackout
        frequency:
          $ref: '#/components/schemas/Frequency'
        rrule:
          type: string
